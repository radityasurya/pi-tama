name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'pi-double-paste-v') || startsWith(github.event.release.tag_name, 'pi-openai-text-verbosity-v') || startsWith(github.event.release.tag_name, 'pi-split-session-v') || startsWith(github.event.release.tag_name, 'pi-welcome-screen-v')
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci --ignore-scripts
      - run: npm run check
      - name: Resolve release package
        id: package
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          case "$RELEASE_TAG" in
            pi-double-paste-v*)
              workspace="@pi-kaush/pi-double-paste"
              directory="extensions/pi-double-paste"
              prefix="pi-double-paste-v"
              ;;
            pi-openai-text-verbosity-v*)
              workspace="@pi-kaush/pi-openai-text-verbosity"
              directory="extensions/pi-openai-text-verbosity"
              prefix="pi-openai-text-verbosity-v"
              ;;
            pi-split-session-v*)
              workspace="@pi-kaush/pi-split-session"
              directory="extensions/pi-split-session"
              prefix="pi-split-session-v"
              ;;
            pi-welcome-screen-v*)
              workspace="@pi-kaush/pi-welcome-screen"
              directory="extensions/pi-welcome-screen"
              prefix="pi-welcome-screen-v"
              ;;
            *)
              echo "Unsupported release tag: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac

          release_version="${RELEASE_TAG#"$prefix"}"
          package_version="$(node -p "require('./$directory/package.json').version")"
          if [ "$release_version" != "$package_version" ]; then
            echo "Release $release_version does not match $workspace@$package_version" >&2
            exit 1
          fi

          echo "workspace=$workspace" >> "$GITHUB_OUTPUT"
      - run: npm publish --workspace "${{ steps.package.outputs.workspace }}" --access public --provenance
